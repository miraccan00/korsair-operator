{{- if .Values.installCRDs }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clustertargets.security.blacksyrius.com
spec:
  group: security.blacksyrius.com
  names:
    kind: ClusterTarget
    listKind: ClusterTargetList
    plural: clustertargets
    shortNames:
    - ct
    singular: clustertarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.nodeCount
      name: Nodes
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterTarget registers a remote Kubernetes cluster for image discovery.
          The operator will connect to the cluster using the referenced kubeconfig Secret
          and include its running images in the scan pipeline.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterTargetSpec defines the desired state of ClusterTarget.
            properties:
              displayName:
                description: displayName is a human-readable label for this cluster
                  (e.g. "Production EU").
                type: string
              excludeNamespaces:
                description: |-
                  excludeNamespaces is a list of namespaces to skip during image discovery in the
                  remote cluster. Uses the same semantics as SecurityScanConfig.
                items:
                  type: string
                type: array
              kubeconfigSecretRef:
                description: |-
                  kubeconfigSecretRef references a Secret in the same namespace whose "kubeconfig" key
                  contains a valid kubeconfig with read access to the target cluster.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - displayName
            - kubeconfigSecretRef
            type: object
          status:
            description: ClusterTargetStatus defines the observed state of ClusterTarget.
            properties:
              lastProbeTime:
                description: lastProbeTime is when the connectivity check was last
                  performed.
                format: date-time
                type: string
              message:
                description: message contains a human-readable description of the
                  last probe result.
                type: string
              nodeCount:
                description: nodeCount is the number of nodes found in the remote
                  cluster during the last probe.
                type: integer
              phase:
                description: 'phase summarises the connectivity state: Connected or
                  Error.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

{{- end }}
