{{- if .Values.installCRDs }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: imagescanjobs.security.blacksyrius.com
spec:
  group: security.blacksyrius.com
  names:
    kind: ImageScanJob
    listKind: ImageScanJobList
    plural: imagescanjobs
    shortNames:
    - isj
    singular: imagescanjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.scanner
      name: Scanner
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.criticalCount
      name: Critical
      type: integer
    - jsonPath: .status.highCount
      name: High
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ImageScanJob represents a single image scanning task.
          These are created automatically by the SecurityScanConfig controller —
          users do not need to create them manually.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the image and scanner configuration for this
              job.
            properties:
              configRef:
                description: configRef is the name of the SecurityScanConfig that
                  triggered this job.
                type: string
              image:
                description: image is the full image reference to scan (e.g. docker.io/library/nginx:1.25).
                type: string
              imageDigest:
                description: |-
                  imageDigest is the content-addressable digest of the image.
                  Used for deduplication — if two tags point to the same digest, only one scan runs.
                type: string
              scanner:
                default: trivy
                description: 'scanner is the tool used for scanning. Supported values:
                  "trivy", "grype".'
                enum:
                - trivy
                - grype
                type: string
              source:
                description: source identifies where this image was discovered from.
                enum:
                - kubernetes
                - manual
                type: string
              sourceNamespace:
                description: |-
                  sourceNamespace is the Kubernetes namespace where the pod running this image was discovered.
                  This may differ from the namespace where the ImageScanJob itself is created (targetNamespace).
                type: string
            required:
            - configRef
            - image
            - scanner
            - source
            type: object
          status:
            description: status reflects the observed state of the scan.
            properties:
              completionTime:
                description: completionTime is when the scan finished (success or
                  failure).
                format: date-time
                type: string
              conditions:
                description: conditions represent the detailed state of the ImageScanJob.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              criticalCount:
                description: criticalCount is the number of CRITICAL severity vulnerabilities
                  found.
                type: integer
              highCount:
                description: highCount is the number of HIGH severity vulnerabilities
                  found.
                type: integer
              jobName:
                description: jobName is the name of the underlying Kubernetes batch/v1
                  Job.
                type: string
              lowCount:
                description: lowCount is the number of LOW severity vulnerabilities
                  found.
                type: integer
              mediumCount:
                description: mediumCount is the number of MEDIUM severity vulnerabilities
                  found.
                type: integer
              message:
                description: message provides a human-readable status message or error
                  description.
                type: string
              phase:
                description: phase is the current lifecycle phase of this scan job.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              startTime:
                description: startTime is when the Kubernetes Job was created.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

{{- end }}
