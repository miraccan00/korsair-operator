{{- if .Values.installCRDs }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: securityscanconfigs.security.blacksyrius.com
spec:
  group: security.blacksyrius.com
  names:
    kind: SecurityScanConfig
    listKind: SecurityScanConfigList
    plural: securityscanconfigs
    shortNames:
    - ssc
    singular: securityscanconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .status.totalImages
      name: TotalImages
      type: integer
    - jsonPath: .status.activeJobs
      name: ActiveJobs
      type: integer
    - jsonPath: .status.completedJobs
      name: CompletedJobs
      type: integer
    - jsonPath: .status.lastScanTime
      name: LastScan
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SecurityScanConfig is the main operator configuration resource.
          It defines image sources, scanning schedule, and scanner tools to use.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired scanning configuration.
            properties:
              imageSources:
                description: imageSources defines which registries and cluster resources
                  to discover images from.
                properties:
                  clusterTargetRefs:
                    description: |-
                      clusterTargetRefs is a list of ClusterTarget names (in korsair-system) whose
                      remote clusters will also be scanned. Images discovered in remote clusters are merged
                      with locally discovered images and scanned using the same scanner pipeline.
                    items:
                      type: string
                    type: array
                  discoverAllClusters:
                    description: |-
                      discoverAllClusters, when true, automatically includes every ClusterTarget in
                      korsair-system that has Phase=Connected. This eliminates the need to manually
                      update clusterTargetRefs when new clusters are registered.
                    type: boolean
                  kubernetes:
                    description: kubernetes enables image discovery from running pods/workloads
                      in the cluster.
                    properties:
                      enabled:
                        description: enabled controls whether Kubernetes image discovery
                          is active.
                        type: boolean
                      excludeNamespaces:
                        description: excludeNamespaces is a list of namespaces to
                          skip during image discovery.
                        items:
                          type: string
                        type: array
                    required:
                    - enabled
                    type: object
                type: object
              notificationCooldown:
                description: |-
                  notificationCooldown is the minimum duration between successive Slack notifications
                  for this SecurityScanConfig. Prevents alert spam when scan cycles run frequently.
                  Accepts Go duration strings: "30m", "1h", "6h", "24h".
                  Falls back to the BSO_NOTIFICATION_COOLDOWN env var, then defaults to "1h".
                type: string
              notificationPolicyRef:
                description: |-
                  notificationPolicyRef is the name of a NotificationPolicy in the target namespace.
                  When set, the webhook URL and thresholds from that policy are used instead of the
                  global BSO_SLACK_WEBHOOK_URL environment variable.
                type: string
              scanners:
                default:
                - trivy
                description: scanners lists which scanner tools to use. Defaults to
                  ["trivy"].
                items:
                  type: string
                type: array
              schedule:
                description: |-
                  schedule is a cron expression for periodic scanning (e.g. "0 2 * * *").
                  If empty, the operator will scan once on creation and not reschedule.
                type: string
              targetNamespace:
                default: korsair-system
                description: |-
                  targetNamespace is the namespace where ImageScanJob resources will be created.
                  Defaults to korsair-system.
                type: string
            required:
            - imageSources
            type: object
          status:
            description: status reflects the observed state of the scanning configuration.
            properties:
              activeJobs:
                description: activeJobs is the number of ImageScanJobs currently running.
                type: integer
              completedJobs:
                description: completedJobs is the number of ImageScanJobs that have
                  finished successfully.
                type: integer
              conditions:
                description: conditions represent the current state of the SecurityScanConfig.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failedJobs:
                description: failedJobs is the number of ImageScanJobs that have failed.
                type: integer
              lastNotificationTime:
                description: |-
                  lastNotificationTime is the timestamp of the last successful Slack notification.
                  Used to enforce the notificationCooldown and survive operator restarts.
                format: date-time
                type: string
              lastScanTime:
                description: lastScanTime is the timestamp of the last image discovery
                  run.
                format: date-time
                type: string
              notifiedImageCount:
                description: |-
                  notifiedImageCount records how many images were in the batch when the last
                  notification was sent. If this changes (new images), notification is re-armed.
                type: integer
              totalImages:
                description: totalImages is the number of unique images discovered
                  in the last scan cycle.
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

{{- end }}
