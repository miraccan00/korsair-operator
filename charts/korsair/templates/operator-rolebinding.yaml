apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "korsair.fullname" . }}-manager
  namespace: {{ .Values.operatorNamespace }}
  labels:
    {{- include "korsair.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "korsair.fullname" . }}-manager
subjects:
- kind: ServiceAccount
  name: {{ include "korsair.serviceAccountName" . }}
  namespace: {{ .Values.operatorNamespace }}
