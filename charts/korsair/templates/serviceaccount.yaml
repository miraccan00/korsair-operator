{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "korsair.serviceAccountName" . }}
  namespace: {{ .Values.operatorNamespace }}
  labels:
    {{- include "korsair.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
