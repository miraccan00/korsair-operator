{{- if .Values.api.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "korsair.fullname" . }}-api
  namespace: {{ .Values.operatorNamespace }}
  labels:
    {{- include "korsair.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "korsair.fullname" . }}-api
subjects:
- kind: ServiceAccount
  name: {{ include "korsair.apiServiceAccountName" . }}
  namespace: {{ .Values.operatorNamespace }}
{{- end }}
