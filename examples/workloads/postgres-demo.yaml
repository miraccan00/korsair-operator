# postgres-demo — Sample workload for Korsair scanning
#
# Deploy this to kind-korsair-dev to provide a real running image for Korsair to discover.
# Korsair will detect postgres:16-alpine in the "demo" namespace and create ImageScanJobs for it.
#
# Usage:
#   kubectl apply -f examples/workloads/postgres-demo.yaml
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-demo
  namespace: demo
  labels:
    app: postgres-demo
    managed-by: korsair-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-demo
  template:
    metadata:
      labels:
        app: postgres-demo
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: "example-password-change-me"
            - name: POSTGRES_DB
              value: "korsair_demo"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-demo
  namespace: demo
spec:
  selector:
    app: postgres-demo
  ports:
    - port: 5432
      targetPort: 5432
