---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.blacksyrius.com
  resources:
  - clustertargets
  - imagescanjobs
  - notificationpolicies
  - securityscanconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.blacksyrius.com
  resources:
  - clustertargets/finalizers
  - imagescanjobs/finalizers
  - notificationpolicies/finalizers
  - securityscanconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - security.blacksyrius.com
  resources:
  - clustertargets/status
  - imagescanjobs/status
  - notificationpolicies/status
  - securityscanconfigs/status
  verbs:
  - get
  - patch
  - update
